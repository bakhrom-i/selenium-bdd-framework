name: Selenium BDD Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * *'

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Start Selenium Grid
        run: docker compose -f docker-grid.yml up -d

      - name: Wait for Grid
        run: |
          for i in {1..30}; do
            curl -sf http://localhost:4444/wd/hub/status && break || sleep 2
          done

      - name: Run Cucumber tests
        run: mvn -B clean test -Dgrid.url=http://localhost:4444 -Dbrowser=chrome
        continue-on-error: true

      - name: Prepare report for Pages
        if: always()
        run: |
          mkdir -p public
          if [ -f target/cucumber-report.html ]; then
            cp target/cucumber-report.html public/index.html
          else
            cat > public/index.html <<'EOF'
          <!doctype html>
          <html><head><title>Selenium BDD Framework</title>
          <style>body{font-family:sans-serif;max-width:680px;margin:60px auto;padding:0 20px;color:#222}
          h1{color:#43B02A}code{background:#f4f4f4;padding:2px 6px;border-radius:4px}</style></head>
          <body><h1>Selenium BDD Framework</h1>
          <p>The Cucumber test report will appear here once tests run successfully.</p>
          <p>Framework structure: Cucumber 7 + JUnit 5 + Selenium 4 + Page Object Model + Selenium Grid.</p>
          <p>See repository <a href="https://github.com/bakhrom-i/selenium-bdd-framework">on GitHub</a>.</p>
          </body></html>
          EOF
          fi

      - name: Upload Pages artifact
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

      - name: Stop Grid
        if: always()
        run: docker compose -f docker-grid.yml down || true

  publish-report:
    needs: test
    if: always() && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/configure-pages@v5
      - id: deployment
        uses: actions/deploy-pages@v4
